<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desktop Audio Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="visualizerCanvas"></canvas>
    
    <!-- Floating Gear Trigger -->
    <div id="controlsTrigger" title="Open Settings">⚙️</div>
    
    <!-- Controls Popup Menu -->
    <div id="controlsMenu">
        <h3>Visualizer Controls</h3>
        
        <div class="menu-scroll">
            <!-- Global / Core Settings -->
            <div class="menu-group">
                <label for="styleSelect">Style:</label>
                <select id="styleSelect">
                    <option value="bars">Classic Bars</option>
                    <option value="eq">LED Equalizer</option>
                    <option value="wave">Oscilloscope</option>
                    <option value="pulse">Neural Pulse</option>
                </select>
            </div>
            
            <div class="menu-group">
                <label for="themeSelect">Theme Preset:</label>
                <select id="themeSelect">
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="matrix">Matrix Green</option>
                    <option value="neon">Neon Pink</option>
                    <option value="volcano">Volcano Red</option>
                    <option value="monochrome">Monochrome</option>
                </select>
            </div>

            <div class="menu-group">
                <label for="gainSlider">Sensitivity:</label>
                <input type="range" id="gainSlider" min="0.5" max="3.0" step="0.1" value="1.0">
            </div>
            
            <div class="menu-group" id="smoothingGroup">
                <label for="smoothingSlider">Smoothing:</label>
                <input type="range" id="smoothingSlider" min="0.0" max="0.95" step="0.05" value="0.5">
            </div>

            <div class="menu-group">
                <label for="scanlinesSlider">Scanlines:</label>
                <input type="range" id="scanlinesSlider" min="0.0" max="0.8" step="0.05" value="0.35">
            </div>

            <div class="menu-group">
                <label for="fftSelect">Resolution:</label>
                <select id="fftSelect">
                    <option value="256">Low</option>
                    <option value="512" selected>Medium</option>
                    <option value="1024">High</option>
                </select>
            </div>

            <div class="menu-group">
                <label for="dbSlider">Audio Floor (dB):</label>
                <input type="range" id="dbSlider" min="-100" max="-30" step="5" value="-90">
            </div>

            <div class="menu-group" id="beatGroup">
                <label for="beatSlider">Beat Sense:</label>
                <input type="range" id="beatSlider" min="0.1" max="0.9" step="0.05" value="0.45">
            </div>

            <!-- Style-Specific: Classic Bars Settings -->
            <div class="style-setting bars-setting">
                <div class="menu-group">
                    <label for="barsSlider">Bar Count:</label>
                    <input type="range" id="barsSlider" min="16" max="128" step="8" value="64">
                </div>
                <div class="menu-group">
                    <label for="barGapSlider">Bar Gap (px):</label>
                    <input type="range" id="barGapSlider" min="0" max="8" step="1" value="2">
                </div>
                <div class="menu-group">
                    <label for="decaySlider">Fall Speed:</label>
                    <input type="range" id="decaySlider" min="0.90" max="0.999" step="0.005" value="0.99">
                </div>
            </div>

            <!-- Style-Specific: LED Equalizer Settings -->
            <div class="style-setting eq-setting">
                <div class="menu-group">
                    <label for="eqColumnsSlider">Columns:</label>
                    <input type="range" id="eqColumnsSlider" min="12" max="48" step="4" value="24">
                </div>
                <div class="menu-group">
                    <label for="segHeightSlider">LED Height:</label>
                    <input type="range" id="segHeightSlider" min="2" max="10" step="1" value="4">
                </div>
                <div class="menu-group">
                    <label for="segGapSlider">LED Gap:</label>
                    <input type="range" id="segGapSlider" min="1" max="5" step="1" value="2">
                </div>
            </div>

            <!-- Style-Specific: Oscilloscope Settings -->
            <div class="style-setting wave-setting">
                <div class="menu-group">
                    <label for="lineWidthSlider">Thickness:</label>
                    <input type="range" id="lineWidthSlider" min="1.0" max="5.0" step="0.5" value="2.5">
                </div>
                <div class="menu-group">
                    <label for="glowSlider">Glow Int.:</label>
                    <input type="range" id="glowSlider" min="0.0" max="1.0" step="0.1" value="0.6">
                </div>
            </div>

            <!-- Style-Specific: Neural Pulse Settings -->
            <div class="style-setting pulse-setting">
                <div class="menu-group">
                    <label for="orbitersSlider">Orbiters:</label>
                    <input type="range" id="orbitersSlider" min="4" max="24" step="2" value="8">
                </div>
                <div class="menu-group">
                    <label for="ringSpeedSlider">Ring Speed:</label>
                    <input type="range" id="ringSpeedSlider" min="0.5" max="3.0" step="0.25" value="1.5">
                </div>
            </div>
        </div>

        <div class="menu-group device-info" style="margin-top: 10px; margin-bottom: 8px;">
            <div id="deviceLabel">Active Source: Default</div>
        </div>
        
        <button id="closeButton">Close Visualizer</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
